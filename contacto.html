<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Asistencia Remota</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/compuzettaoficial/service/refs/heads/main/Favi.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-link { color: #06b6d4; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="https://raw.githubusercontent.com/compuzettaoficial/service/refs/heads/main/img/logo_compuzetta.png" 
                         alt="CompuZetta" 
                         class="h-12 w-auto">
                    <h1 class="text-2xl font-bold text-gray-900">Asistencia Remota</h1>
                </div>
                <div class="flex gap-8">
                    <a href="index.html" class="text-gray-600 hover:text-cyan-500 transition">
                        Inicio
                    </a>
                    <a href="programas.html" class="text-gray-600 hover:text-cyan-500 transition">
                        Programas
                    </a>
                    <a href="contacto.html" class="active-link hover:text-cyan-500 transition">
                        Contacto
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="max-w-6xl mx-auto px-6 py-20">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold text-gray-900 mb-4">
                Contacto
            </h2>
            <p class="text-lg text-gray-600">
                ¿Necesitas ayuda? Contáctame
            </p>
        </div>

        <div class="grid md:grid-cols-2 gap-8 items-center">
            <!-- Imagen del técnico -->
            <div class="order-2 md:order-1">
                <img src="https://raw.githubusercontent.com/compuzettaoficial/service/refs/heads/main/img/logo_tecnico.jpg" 
                     alt="Soporte Técnico Profesional" 
                     class="w-full h-auto rounded-lg shadow-lg">
            </div>

            <!-- Formulario -->
            <div class="order-1 md:order-2 bg-white p-8 rounded-lg shadow-sm">
                <form action="https://formsubmit.co/compuzettaoficial@gmail.com" method="POST" class="space-y-6">
                    <!-- FormSubmit Configuration -->
                    <input type="hidden" name="_subject" value="Nuevo mensaje de contacto - Asistencia Remota">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_template" value="table">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Nombre
                        </label>
                        <input type="text" name="nombre" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                               placeholder="Tu nombre">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Email
                        </label>
                        <input type="email" name="email" required
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                               placeholder="tu@email.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Teléfono (opcional)
                        </label>
                        <input type="tel" name="telefono"
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                               placeholder="+51 999 999 999">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            Mensaje
                        </label>
                        <textarea name="mensaje" rows="5" required
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cyan-500 focus:border-transparent"
                                  placeholder="Describe tu problema o consulta..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 text-white px-6 py-3 rounded-lg hover:from-cyan-600 hover:to-blue-700 transition-all shadow-lg">
                        Enviar Mensaje
                    </button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white mt-20">
        <div class="max-w-6xl mx-auto px-6 py-8 text-center">
            <p class="text-gray-400">
                © 2024 Asistencia Remota. Soporte técnico profesional.
            </p>
        </div>
    </footer>
</body>
</html>
